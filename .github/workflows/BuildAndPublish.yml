name: Build and Publish

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      forcePublish:
        description: 'Force publish to NuGet even if not on main branch'
        required: false
        default: 'false'
        type: boolean

env:
    NUGET_PUBLISH_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
    BASE_VERSION: 1.0

jobs:
  build:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: '8.0.x'

      - name: Determine version
        id: version
        run: |
          $version = "${{ env.BASE_VERSION }}.${{ github.run_number }}"
          echo "version=$version" >> $env:GITHUB_OUTPUT
          Write-Host "Building version: $version"
        shell: pwsh

      - name: Restore dependencies
        run: dotnet restore MessageSerialization.sln

      - name: Build
        run: dotnet build MessageSerialization.sln --configuration Release --no-restore -p:Version=${{ steps.version.outputs.version }}

      # - name: Upload build artifacts
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: build-output
      #     path: '**/bin/Release/**'
      #     retention-days: 1

      - name: Run tests
        run: dotnet test MessageSerialization.sln --configuration Release --logger "trx;LogFileName=test-results.trx" --no-build

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: '**/test-results.trx'
          check_name: Unit Test Results

      - name: Create NuGet package
        run: dotnet pack MessageSerializer/MessageSerializer.csproj --configuration Release --output nupkg -p:Version=${{ needs.build.outputs.version }} --no-build

      - name: Publish to GitHub Packages
        if: |
          (github.ref == 'refs/heads/main') || 
          (github.event_name == 'workflow_dispatch' && github.event.inputs.forcePublish == 'true')
        run: dotnet nuget push "nupkg/*.nupkg" --source ${{ env.NUGET_PUBLISH_URL }} --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate
