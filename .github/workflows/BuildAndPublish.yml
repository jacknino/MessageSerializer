name: Build and Publish

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      forcePublish:
        description: 'Force publish to NuGet even if not on main branch'
        required: false
        default: 'false'
        type: boolean

env:
    GITHUB_NUGET_PUBLISH_URL: https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json
    # ACTUAL_NUGET_PUBLISH_URL: https://api.nuget.org/v3/index.json
    ACTUAL_NUGET_PUBLISH_URL: https://int.nugettest.org
    BASE_VERSION: 1.0

jobs:
  git-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.head_ref }}
          fetch-depth: 0  

      # https://github.com/marketplace/actions/git-version
      - name: Git Version
        id: version
        uses: codacy/git-version@2.5.4

  build:
    runs-on: windows-latest
    needs: [ git-version ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      
      # - name: Determine version
        # id: version
        # run: |
          # $version = "${{ env.BASE_VERSION }}.${{ github.run_number }}"
          # echo "version=$version" >> $env:GITHUB_OUTPUT
          # Write-Host "Building version: $version"
        # shell: pwsh

      # https://github.com/marketplace/actions/git-version
      # - name: Git Version
        # id: version
        # uses: codacy/git-version@2.5.4
        # with:
          # release-branch: main

      - name: Restore dependencies
        run: dotnet restore MessageSerialization.sln

      - name: Build
        run: dotnet build MessageSerialization.sln --configuration Release --no-restore -p:Version=${{ needs.git-version.outputs.version }}

      - name: Run tests
        run: dotnet test MessageSerialization.sln --configuration Release --logger "trx;LogFileName=test-results.trx" --no-build

      - name: Publish Test Results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: '**/*.trx'
          reporter: dotnet-trx
        
      - name: Create NuGet package
        run: dotnet pack MessageSerializer/MessageSerializer.csproj --configuration Release --output nupkg -p:Version=${{ needs.git-version.outputs.version }} --no-build

      - name: Create NuGet package
        run: |
            cd
            dir /s *.nupkg
            echo MessageSerializer\bin\Release\JackNino.MessageSerializer.${{ needs.git-version.outputs.version }}.nupkg
            dir MessageSerializer\bin\Release\JackNino.MessageSerializer.${{ needs.git-version.outputs.version }}.nupkg
        shell: cmd

      - name: Publish to GitHub Packages
        if: |
          (github.ref == 'refs/heads/main') || 
          (github.event_name == 'workflow_dispatch' && github.event.inputs.forcePublish == 'true')
        run: dotnet nuget push --source ${{ env.GITHUB_NUGET_PUBLISH_URL }} --api-key ${{ secrets.GITHUB_TOKEN }} MessageSerializer/bin/Release/JackNino.MessageSerializer.${{ needs.git-version.outputs.version }}.nupkg

      # Get a short-lived NuGet API key
      - name: Get NuGet temp API key
        uses: NuGet/login@v1
        if: |
          (github.ref == 'refs/heads/main') || 
          (github.event_name == 'workflow_dispatch' && github.event.inputs.forcePublish == 'true')
        id: login
        with:
          user: ${{ secrets.NUGET_PUBLISH_USERNAME }}
    
      # Push the package
      - name: NuGet push
        if: |
          (github.ref == 'refs/heads/main') || 
          (github.event_name == 'workflow_dispatch' && github.event.inputs.forcePublish == 'true')
        run: dotnet nuget push --source ${{ env.ACTUAL_NUGET_PUBLISH_URL }} --api-key ${{steps.login.outputs.NUGET_API_KEY}} MessageSerializer/bin/Release/JackNino.MessageSerializer.${{ needs.git-version.outputs.version }}.nupkg
